<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Heading Optimizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan:   #00D9FF;
      --amber:  #F59E0B;
      --red:    #EF4444;
      --green:  #22C55E;
      --gray:   #9CA3AF;
      --bg:     #080c10;
      --bg2:    #0d1520;
      --bg3:    #111d2b;
      --border: #1a2535;
      --muted:  #6B7280;
      --text:   #E5E7EB;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .report-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,12,16,0.97); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 2rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .logo-mark {
      width: 32px; height: 32px; background: var(--cyan); border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 800; color: #000; flex-shrink: 0;
    }
    .header-title { font-size: 1rem; font-weight: 700; color: #fff; }
    .header-title span { color: var(--cyan); }
    .header-sub { font-size: 0.7rem; color: var(--muted); }

    /* ── Layout ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    /* ── Panels ── */
    .panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .panel-title {
      font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--cyan); margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.4rem;
    }

    /* ── Inputs ── */
    .row { display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; }
    input[type="text"], input[type="url"], input[type="password"] {
      flex: 1; min-width: 200px;
      padding: 0.6rem 0.9rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 0;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--cyan); }

    /* ── Buttons ── */
    button {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 0;
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
      letter-spacing: 0.03em;
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-cyan  { background: var(--cyan);  color: #000; }
    .btn-green { background: var(--green); color: #000; }
    .btn-muted { background: var(--bg3); color: var(--gray); border: 1px solid var(--border); }

    /* ── Status ── */
    .status { font-size: 0.8rem; color: var(--muted); margin-top: 0.75rem; min-height: 1.2rem; }
    .status.error { color: var(--red); }
    .status.ok    { color: var(--green); }

    /* ── API key saved ── */
    .api-key-saved { font-size: 0.78rem; color: var(--green); font-weight: 600; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    thead th {
      background: var(--bg3);
      padding: 0.6rem 0.75rem;
      text-align: left;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    tbody td {
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      color: var(--text);
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--bg3); }

    /* ── Level badge ── */
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 0;
      font-size: 0.72rem;
      font-weight: 700;
      background: #00D9FF15;
      color: var(--cyan);
      border: 1px solid #00D9FF30;
    }

    /* ── Char counts ── */
    .char-ok   { color: var(--cyan);  font-weight: 600; }
    .char-over { color: var(--red);   font-weight: 700; }
    .char-none { color: var(--muted); }

    /* ── Notes ── */
    .notes-cell { font-size: 0.78rem; color: var(--muted); font-style: italic; }

    /* ── Score ── */
    .score-badge {
      display: inline-block; padding: 0.15rem 0.5rem;
      border-radius: 0; font-size: 0.75rem; font-weight: 700;
    }
    .score-good  { background: #00D9FF15; color: var(--cyan);  border: 1px solid #00D9FF30; }
    .score-mid   { background: #F59E0B15; color: var(--amber); border: 1px solid #F59E0B30; }
    .score-poor  { background: #EF444415; color: var(--red);   border: 1px solid #EF444430; }
    .no-change   { color: var(--muted); font-style: italic; }

    /* ── Actions ── */
    .actions { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: flex-end; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.85rem; }

  </style>
</head>
<body>

<header class="report-header">
  <div class="header-left">
    <div class="logo-mark">HO</div>
    <div>
      <div class="header-title">Heading Optimizer <span>&middot;</span> JPS Develops</div>
      <div class="header-sub">Powered by Claude</div>
    </div>
  </div>
</header>

<main class="main">

  <div class="panel">
    <div class="panel-title">🔑 Anthropic API Key</div>
    <div class="row">
      <input type="password" id="apiKey" placeholder="sk-ant-..." />
      <button class="btn-cyan" onclick="saveApiKey()">Save Key</button>
      <span class="api-key-saved" id="apiKeySaved" style="display:none">✓ Key saved</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">📥 Step 1 — Pull Headings</div>
    <div class="row">
      <input type="url" id="pageUrl" placeholder="https://example.com/page-to-audit" />
      <button class="btn-cyan" id="pullBtn" onclick="pullHeadings()">Pull Headings</button>
    </div>
    <div class="status" id="pullStatus"></div>
  </div>

  <div class="panel">
    <div class="panel-title">⚡ Step 2 — Optimize with Claude</div>
    <div class="row">
      <input type="text" id="keyword" placeholder="Primary keyword / topic focus (e.g. emergency HVAC repair Dallas)" />
      <button class="btn-green" id="optimizeBtn" onclick="optimizeHeadings()" disabled>Optimize Headings</button>
    </div>
    <div class="status" id="optimizeStatus"></div>
  </div>

<div class="panel">
    <div class="panel-title">📊 Results</div>
    <div class="table-wrap" id="tableContainer">
      <div class="empty-state">Pull headings from a URL to get started.</div>
    </div>
    <div class="actions" id="actions" style="display:none">
      <button class="btn-muted" onclick="newAnalysis()">↩ New Analysis</button>
      <button class="btn-muted" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
  </div>

</main>

<script>
  let headings = [];
  let results = [];

  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('anthropic_api_key');
    if (saved) {
      document.getElementById('apiKey').value = saved;
      document.getElementById('apiKeySaved').style.display = 'inline';
    }
  });

  function saveApiKey() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) return;
    localStorage.setItem('anthropic_api_key', key);
    document.getElementById('apiKeySaved').style.display = 'inline';
  }

  function getApiKey() {
    return document.getElementById('apiKey').value.trim() || localStorage.getItem('anthropic_api_key') || '';
  }

  function setStatus(id, msg, isError = false) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'status' + (isError ? ' error' : ' ok');
    if (!msg) el.className = 'status';
  }

  function charClass(count, level) {
    const limit = level === 'H1' ? 70 : 60;
    return count > limit ? 'char-over' : 'char-ok';
  }

  async function pullHeadings() {
    const url = document.getElementById('pageUrl').value.trim();
    if (!url) return setStatus('pullStatus', 'Please enter a URL.', true);
    if (!getApiKey()) return setStatus('pullStatus', 'Please enter your Anthropic API key above.', true);

    const btn = document.getElementById('pullBtn');
    btn.disabled = true;
    setStatus('pullStatus', 'Fetching headings...');

    try {
      const res = await fetch('/api/pull-headings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      headings = data.headings;
      results = headings.map(h => ({ original: h.text, optimized: '', level: h.level, notes: '' }));

      setStatus('pullStatus', `✓ Found ${headings.length} headings.`);
      document.getElementById('optimizeBtn').disabled = false;
      renderTable();
    } catch (err) {
      setStatus('pullStatus', `Error: ${err.message}`, true);
    } finally {
      btn.disabled = false;
    }
  }

  async function optimizeHeadings() {
    if (!headings.length) return;
    const apiKey = getApiKey();
    if (!apiKey) return setStatus('optimizeStatus', 'Please enter your Anthropic API key above.', true);
    const keyword = document.getElementById('keyword').value.trim();

    const btn = document.getElementById('optimizeBtn');
    btn.disabled = true;
    setStatus('optimizeStatus', 'Sending to Claude...');

    try {
      const res = await fetch('/api/optimize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ headings, keyword, apiKey })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      results = data.results;
      setStatus('optimizeStatus', `✓ Optimized ${results.length} headings.`);
      renderTable();
    } catch (err) {
      setStatus('optimizeStatus', `Error: ${err.message}`, true);
    } finally {
      btn.disabled = false;
    }
  }

  function scoreClass(score) {
    if (!score) return '';
    if (score >= 8) return 'score-good';
    if (score >= 5) return 'score-mid';
    return 'score-poor';
  }

  function renderTable() {
    if (!results.length) return;
    const container = document.getElementById('tableContainer');
    const rows = results.map(r => {
      const isNew = !r.original;
      const isNoChange = r.optimized && r.original && r.optimized === r.original;
      const aLen = r.original ? r.original.length : 0;
      const bLen = r.optimized ? r.optimized.length : 0;

      const colA = isNew
        ? '<span style="color:var(--muted);font-style:italic">New suggestion</span>'
        : escHtml(r.original);

      const colB = isNoChange
        ? `<span class="no-change">${escHtml(r.optimized)}</span>`
        : (r.optimized ? escHtml(r.optimized) : '<span style="color:var(--muted)">—</span>');

      const scoreBadge = r.score
        ? `<span class="score-badge ${scoreClass(r.score)}">${r.score}/10</span>`
        : '<span style="color:var(--muted)">—</span>';

      return `<tr>
        <td>${colA}</td>
        <td>${colB}</td>
        <td><span class="badge">${r.level}</span></td>
        <td class="${aLen ? charClass(aLen, r.level) : 'char-none'}">${aLen || '—'}</td>
        <td class="${bLen ? charClass(bLen, r.level) : 'char-none'}">${bLen || '—'}</td>
        <td>${scoreBadge}</td>
        <td class="notes-cell">${r.notes ? escHtml(r.notes) : ''}</td>
      </tr>`;
    }).join('');

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Original Heading (A)</th>
            <th>Optimized Heading (B)</th>
            <th>Level</th>
            <th>Char (A)</th>
            <th>Char (B)</th>
            <th>Score</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;

    document.getElementById('actions').style.display = 'flex';
  }

  function newAnalysis() {
    headings = [];
    results = [];
    document.getElementById('pageUrl').value = '';
    document.getElementById('keyword').value = '';
    document.getElementById('tableContainer').innerHTML = '<div class="empty-state">Pull headings from a URL to get started.</div>';
    document.getElementById('actions').style.display = 'none';
    document.getElementById('optimizeBtn').disabled = true;
    setStatus('pullStatus', '');
    setStatus('optimizeStatus', '');
    document.getElementById('pageUrl').focus();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function exportCSV() {
    const header = 'Original Heading,Optimized Heading,Level,Char Count A,Char Count B,Score,Notes';
    const rows = results.map(r =>
      [r.original || '', r.optimized || '', r.level, r.original?.length || 0, r.optimized?.length || '', r.score || '', r.notes || '']
        .map(v => `"${String(v).replace(/"/g, '""')}"`)
        .join(',')
    );
    const csv = [header, ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'heading-optimizer-results.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
