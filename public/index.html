<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Heading Optimizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.25rem; color: #1a1a2e; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }
    .panel {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .panel h2 { font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #888; margin-bottom: 1rem; }
    .row { display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; }
    input[type="text"], input[type="url"] {
      flex: 1; min-width: 200px;
      padding: 0.6rem 0.9rem;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4f46e5; }
    button {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-blue { background: #4f46e5; color: white; }
    .btn-green { background: #16a34a; color: white; }
    .btn-gray { background: #e5e7eb; color: #374151; }
    .status { font-size: 0.85rem; color: #555; margin-top: 0.75rem; min-height: 1.2rem; }
    .status.error { color: #dc2626; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th {
      background: #f8f9fb;
      padding: 0.65rem 0.75rem;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      border-bottom: 1.5px solid #e8e8ee;
    }
    td {
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid #f0f0f5;
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafe; }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      background: #ede9fe;
      color: #5b21b6;
    }
    .char-count { font-size: 0.8rem; color: #888; }
    .char-over { color: #dc2626; font-weight: 700; }
    .notes-cell { font-size: 0.82rem; color: #666; font-style: italic; }
    .actions { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: flex-end; }
    .empty-state { text-align: center; padding: 3rem; color: #aaa; font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="container">
  <h1>🔤 Heading Optimizer</h1>
  <p class="subtitle">Pull H1–H6 tags from any URL and optimize them with Claude AI</p>

  <div class="panel">
    <h2>Step 1 — Pull Headings</h2>
    <div class="row">
      <input type="url" id="pageUrl" placeholder="https://example.com/page-to-audit" />
      <button class="btn-blue" id="pullBtn" onclick="pullHeadings()">Pull Headings → Column A</button>
    </div>
    <div class="status" id="pullStatus"></div>
  </div>

  <div class="panel">
    <h2>Step 2 — Optimize</h2>
    <div class="row">
      <input type="text" id="keyword" placeholder="Primary keyword / topic focus (e.g. emergency HVAC repair Dallas)" />
      <button class="btn-green" id="optimizeBtn" onclick="optimizeHeadings()" disabled>Optimize → Column B</button>
    </div>
    <div class="status" id="optimizeStatus"></div>
  </div>

  <div class="panel">
    <h2>Results</h2>
    <div id="tableContainer">
      <div class="empty-state">Pull headings from a URL to get started.</div>
    </div>
    <div class="actions" id="actions" style="display:none">
      <button class="btn-gray" onclick="copyCSV()">📋 Copy as CSV</button>
    </div>
  </div>
</div>

<script>
  let headings = [];
  let results = [];

  function setStatus(id, msg, isError = false) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'status' + (isError ? ' error' : '');
  }

  function charClass(count, level) {
    const limit = level === 'H1' ? 70 : 60;
    return count > limit ? 'char-count char-over' : 'char-count';
  }

  async function pullHeadings() {
    const url = document.getElementById('pageUrl').value.trim();
    if (!url) return setStatus('pullStatus', 'Please enter a URL.', true);

    const btn = document.getElementById('pullBtn');
    btn.disabled = true;
    setStatus('pullStatus', 'Fetching headings...');

    try {
      const res = await fetch('/api/pull-headings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      headings = data.headings;
      results = headings.map(h => ({ original: h.text, optimized: '', level: h.level, notes: '' }));

      setStatus('pullStatus', `✅ Found ${headings.length} headings.`);
      document.getElementById('optimizeBtn').disabled = false;
      renderTable();
    } catch (err) {
      setStatus('pullStatus', `Error: ${err.message}`, true);
    } finally {
      btn.disabled = false;
    }
  }

  async function optimizeHeadings() {
    if (!headings.length) return;
    const keyword = document.getElementById('keyword').value.trim();

    const btn = document.getElementById('optimizeBtn');
    btn.disabled = true;
    setStatus('optimizeStatus', 'Sending to Claude...');

    try {
      const res = await fetch('/api/optimize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ headings, keyword })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      results = data.results;
      setStatus('optimizeStatus', `✅ Optimized ${results.length} headings.`);
      renderTable();
    } catch (err) {
      setStatus('optimizeStatus', `Error: ${err.message}`, true);
    } finally {
      btn.disabled = false;
    }
  }

  function renderTable() {
    if (!results.length) return;
    const container = document.getElementById('tableContainer');
    const rows = results.map(r => {
      const aLen = r.original.length;
      const bLen = r.optimized ? r.optimized.length : 0;
      return `<tr>
        <td>${escHtml(r.original)}</td>
        <td>${r.optimized ? escHtml(r.optimized) : '<span style="color:#ccc">—</span>'}</td>
        <td><span class="badge">${r.level}</span></td>
        <td class="${charClass(aLen, r.level)}">${aLen}</td>
        <td class="${bLen ? charClass(bLen, r.level) : 'char-count'}">${bLen || '—'}</td>
        <td class="notes-cell">${r.notes ? escHtml(r.notes) : ''}</td>
      </tr>`;
    }).join('');

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Original Heading (A)</th>
            <th>Optimized Heading (B)</th>
            <th>Level</th>
            <th>Char (A)</th>
            <th>Char (B)</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;

    document.getElementById('actions').style.display = 'flex';
  }

  function copyCSV() {
    const header = 'Original Heading,Optimized Heading,Level,Char Count A,Char Count B,Notes';
    const rows = results.map(r =>
      [r.original, r.optimized, r.level, r.original.length, r.optimized?.length || '', r.notes]
        .map(v => `"${String(v).replace(/"/g, '""')}"`)
        .join(',')
    );
    navigator.clipboard.writeText([header, ...rows].join('\n'));
    alert('CSV copied to clipboard!');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
